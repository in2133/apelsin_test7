<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Чат (Официальный виджет)</title>
    <!-- Подключаем стили официального виджета -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

   <style>
        /* Ваши стили сайта + кастомизация цветов виджета */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 { 
            font-size: 3rem; 
            margin-bottom: 10px; 
        }
        p { 
            color: #888; 
            font-size: 1.2rem; 
        }

        /* Кастомизация самого виджета (меняем цвет кнопки и окна под ваш черный сайт) */
        :root {
            --chat--color--primary: #ffffff;
            --chat--color--dark: #000000;
            --chat--window--background: #111111;
            --chat--header--background: #000000;
            --chat--header--color: #ffffff;
            --chat--message--bot--background: #1a1a1a;
            --chat--message--bot--color: #ffffff;
            --chat--message--user--background: #ffffff;
            --chat--message--user--color: #000000;
            --chat--toggle--background: #ffffff;
            --chat--toggle--color: #000000;
        }
    </style>
</head>
<body>
    <!-- Контейнер, куда встроится чат -->
    <div id="n8n-chat"></div>

    <!-- Подключаем и запускаем виджет -->
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://n8n-production-1073f.up.railway.app/webhook/b817e11a-4fac-4c8e-99c4-a75789c288b2/chat', // <-- ВАЖНО: Ссылка из Chat Trigger
            target: '#n8n-chat',        // ID контейнера
            mode: 'window',             // Режим всплывающего окна
            showWelcomeScreen: true,    // Показывать экран приветствия
            initialMessages: [          // Первые сообщения от бота
                'Привет! 👋',
                'Я ваш ассистент. Задавайте вопросы.'
            ],
            i18n: {                     // Перевод интерфейса
                en: {
                    title: 'Чат с поддержкой',
                    subtitle: 'Мы онлайн и готовы помочь',
                    footer: '',
                    getStarted: 'Новый диалог',
                    inputPlaceholder: 'Введите ваше сообщение...',
                }
            },
        });
    </script>
</body>
</html>
